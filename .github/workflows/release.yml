name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.2). Tag must already exist."
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          archive="sracha-${TARGET}.tar.gz"
          tar -C "target/${TARGET}/release" -czf "$archive" sracha
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "$archive.sha256"
          else
            shasum -a 256 "$archive" > "$archive.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sracha-${{ matrix.target }}
          path: |
            sracha-${{ matrix.target }}.tar.gz
            sracha-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts + build combined checksums.txt
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.tar.gz.sha256' \) -exec cp {} dist/ \;
          ( cd dist && cat *.tar.gz.sha256 > checksums.txt )
          ls -l dist

      - name: Extract changelog for this version
        env:
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          body=""
          if [ -f CHANGELOG.md ]; then
            body=$(awk -v ver="$version" '
              /^## / { if (found) exit; if (index($0, ver)) found=1; next }
              found { print }
            ' CHANGELOG.md)
          fi
          if [ -z "${body// /}" ]; then
            printf 'Release %s.\n\nSee the commit log for changes in this version.\n' "$TAG" > release_notes.md
          else
            printf '%s\n' "$body" > release_notes.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body_path: release_notes.md
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/checksums.txt
